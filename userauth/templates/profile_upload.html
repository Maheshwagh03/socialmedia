{% load static %}

<div class="modal fade" id="exampleModal2" tabindex="-1" aria-labelledby="exampleModalLabel" aria-hidden="true">
  <div class="modal-dialog">
    <div class="modal-content">

      <div class="modal-header">
        <h1 class="modal-title fs-5">New Post</h1>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>

      <div class="modal-body">

        <form action="{% url 'upload' %}" method="POST" enctype="multipart/form-data">
          {% csrf_token %}

          <div class="mb-3">
            <img src="{% static 'css/upload.png' %}" class="m-1">

            <label class="col-form-label">Photo</label>
            <input type="file" name="image_upload" class="form-control" required>
          </div>

          <div class="mb-3">
            <label class="col-form-label">Caption</label>
            <textarea class="form-control" name="caption" placeholder="Caption..."></textarea>
          </div>

      </div>

      <div class="modal-footer">
        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
        <button type="submit" class="btn btn-primary">Create Post</button>
      </div>

        </form>

    </div>
  </div>
</div>
